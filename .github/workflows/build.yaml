name: Build add-on images

on:
  push:
    branches: [main]
    paths: ["ultimate-mcp/**", "server/**", ".github/workflows/build.yaml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.13-alpine3.24
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.13-alpine3.24
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read add-on version
        id: ver
        run: echo "version=$(grep -oP '^version:\s*"\K[^"]+' ultimate-mcp/config.yaml)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
        if: matrix.arch != 'amd64'

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ultimate-mcp/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-ultimate-mcp:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-ultimate-mcp:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
